<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Libreria - Categorias</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">📚 Libreria</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="autores.html">Autores</a>
            <a class="nav-link" href="perfiles.html">Perfiles</a>
            <a class="nav-link" href="libros.html">Libros</a>
            <a class="nav-link active" href="categorias.html">Categorias</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Categorias</h2>

    <div class="card mb-4">
        <div class="card-header" id="formTitulo">Nueva Categoria</div>
        <div class="card-body">
            <form id="formCategoria">
                <input type="hidden" id="categoriaId"/>
                <div class="row g-2">
                    <div class="col-md-4">
                        <input class="form-control" id="nombre" placeholder="Nombre" required/>
                    </div>
                    <div class="col-md-8">
                        <input class="form-control" id="descripcion" placeholder="Descripcion" required/>
                    </div>
                </div>
                <button class="btn btn-primary mt-2" type="submit">Guardar</button>
                <button class="btn btn-secondary mt-2" type="button" onclick="limpiarForm()">Cancelar</button>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Descripcion</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
</div>

<script>
    const API = 'http://localhost:8080/api/categorias';

    async function cargarCategorias() {
        const res = await fetch(API);
        const categorias = await res.json();
        const tbody = document.getElementById('tablaBody');
        tbody.innerHTML = '';
        categorias.forEach(function(c) {
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td>' + c.id + '</td>' +
                '<td>' + c.nombre + '</td>' +
                '<td>' + c.descripcion + '</td>' +
                '<td>' +
                    '<button class="btn btn-sm btn-warning me-1" onclick="editarCategoria(' + c.id + ',\'' + escapeJs(c.nombre) + '\',\'' + escapeJs(c.descripcion) + '\')">Editar</button>' +
                    '<button class="btn btn-sm btn-danger" onclick="eliminarCategoria(' + c.id + ')">Eliminar</button>' +
                '</td>';
            tbody.appendChild(tr);
        });
    }

    document.getElementById('formCategoria').addEventListener('submit', async function(e) {
        e.preventDefault();
        var id = document.getElementById('categoriaId').value;
        var body = {
            nombre: document.getElementById('nombre').value,
            descripcion: document.getElementById('descripcion').value
        };
        var url = id ? API + '/' + id : API;
        var method = id ? 'PUT' : 'POST';
        var res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            limpiarForm();
            cargarCategorias();
        } else {
            var err = await res.json();
            alert(JSON.stringify(err));
        }
    });

    function editarCategoria(id, nombre, descripcion) {
        document.getElementById('categoriaId').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('descripcion').value = descripcion;
        document.getElementById('formTitulo').textContent = 'Editar Categoria';
    }

    async function eliminarCategoria(id) {
        if (!confirm('Desea eliminar esta categoria?')) return;
        var res = await fetch(API + '/' + id, { method: 'DELETE' });
        if (res.ok) {
            cargarCategorias();
        } else {
            alert('No se pudo eliminar');
        }
    }

    function limpiarForm() {
        document.getElementById('formCategoria').reset();
        document.getElementById('categoriaId').value = '';
        document.getElementById('formTitulo').textContent = 'Nueva Categoria';
    }

    function escapeJs(str) {
        if (!str) return '';
        return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    cargarCategorias();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
