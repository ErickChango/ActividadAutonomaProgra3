<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Libreria - Autores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">📚 Libreria</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="autores.html">Autores</a>
            <a class="nav-link" href="perfiles.html">Perfiles</a>
            <a class="nav-link" href="libros.html">Libros</a>
            <a class="nav-link" href="categorias.html">Categorias</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Autores</h2>

    <div class="card mb-4">
        <div class="card-header" id="formTitulo">Nuevo Autor</div>
        <div class="card-body">
            <form id="formAutor">
                <input type="hidden" id="autorId"/>
                <div class="row g-2">
                    <div class="col-md-4">
                        <input class="form-control" id="nombre" placeholder="Nombre" required/>
                    </div>
                    <div class="col-md-4">
                        <input class="form-control" id="apellido" placeholder="Apellido" required/>
                    </div>
                    <div class="col-md-4">
                        <input class="form-control" id="email" type="email" placeholder="Email" required/>
                    </div>
                </div>
                <button class="btn btn-primary mt-2" type="submit">Guardar</button>
                <button class="btn btn-secondary mt-2" type="button" onclick="limpiarForm()">Cancelar</button>
            </form>
        </div>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
</div>

<script>
    const API = 'http://localhost:8080/api/autores';

    async function cargarAutores() {
        const res = await fetch(API);
        const autores = await res.json();
        const tbody = document.getElementById('tablaBody');
        tbody.innerHTML = '';
        autores.forEach(function(a) {
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td>' + a.id + '</td>' +
                '<td>' + a.nombre + '</td>' +
                '<td>' + a.apellido + '</td>' +
                '<td>' + a.email + '</td>' +
                '<td>' +
                    '<button class="btn btn-sm btn-warning me-1" onclick="editarAutor(' + a.id + ',\'' + a.nombre + '\',\'' + a.apellido + '\',\'' + a.email + '\')">Editar</button>' +
                    '<button class="btn btn-sm btn-danger" onclick="eliminarAutor(' + a.id + ')">Eliminar</button>' +
                '</td>';
            tbody.appendChild(tr);
        });
    }

    document.getElementById('formAutor').addEventListener('submit', async function(e) {
        e.preventDefault();
        var id = document.getElementById('autorId').value;
        var body = {
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            email: document.getElementById('email').value
        };
        var url = id ? API + '/' + id : API;
        var method = id ? 'PUT' : 'POST';
        var res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            limpiarForm();
            cargarAutores();
        } else {
            var err = await res.json();
            alert(JSON.stringify(err));
        }
    });

    function editarAutor(id, nombre, apellido, email) {
        document.getElementById('autorId').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('apellido').value = apellido;
        document.getElementById('email').value = email;
        document.getElementById('formTitulo').textContent = 'Editar Autor';
    }

    async function eliminarAutor(id) {
        if (!confirm('Desea eliminar este autor?')) return;
        var res = await fetch(API + '/' + id, { method: 'DELETE' });
        if (res.ok) {
            cargarAutores();
        } else {
            alert('No se pudo eliminar');
        }
    }

    function limpiarForm() {
        document.getElementById('formAutor').reset();
        document.getElementById('autorId').value = '';
        document.getElementById('formTitulo').textContent = 'Nuevo Autor';
    }

    cargarAutores();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
