<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Libreria - Libros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">📚 Libreria</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="autores.html">Autores</a>
            <a class="nav-link" href="perfiles.html">Perfiles</a>
            <a class="nav-link active" href="libros.html">Libros</a>
            <a class="nav-link" href="categorias.html">Categorias</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Libros</h2>
    <p class="text-muted">Relacion uno a muchos con Autor — Relacion muchos a muchos con Categoria</p>

    <!-- formulario crear / editar libro -->
    <div class="card mb-3">
        <div class="card-header" id="formTitulo">Nuevo Libro</div>
        <div class="card-body">
            <form id="formLibro">
                <input type="hidden" id="libroId"/>
                <div class="row g-2">
                    <div class="col-md-3">
                        <input class="form-control" id="titulo" placeholder="Titulo" required/>
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" id="isbn" placeholder="ISBN" required/>
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" id="anioPublicacion" type="number"
                               placeholder="Anio" min="1000" max="2100" required/>
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" id="editorial" placeholder="Editorial"/>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="libroAutorId" required>
                            <option value="">Seleccionar autor...</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary mt-2" type="submit">Guardar</button>
                <button class="btn btn-secondary mt-2" type="button" onclick="limpiarForm()">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- asignar / quitar categoria -->
    <div class="card mb-4">
        <div class="card-header">Asignar o quitar categoria</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-4">
                    <select class="form-select" id="libroSelCat">
                        <option value="">Seleccionar libro...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select" id="catSelCat">
                        <option value="">Seleccionar categoria...</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success" id="btnAsignar">Asignar</button>
                    <button class="btn btn-outline-danger ms-2" id="btnQuitar">Quitar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- tabla de libros -->
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Titulo</th>
            <th>ISBN</th>
            <th>Anio</th>
            <th>Editorial</th>
            <th>Autor</th>
            <th>Categorias</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
</div>

<script>
    const API_LIBROS     = 'http://localhost:8080/api/libros';
    const API_AUTORES    = 'http://localhost:8080/api/autores';
    const API_CATEGORIAS = 'http://localhost:8080/api/categorias';

    async function cargarSelectores() {
        const [resA, resC] = await Promise.all([fetch(API_AUTORES), fetch(API_CATEGORIAS)]);
        const autores    = await resA.json();
        const categorias = await resC.json();

        // select del formulario de libro
        const selAutor = document.getElementById('libroAutorId');
        selAutor.innerHTML = '<option value="">Seleccionar autor...</option>';
        autores.forEach(function(a) {
            const opt = document.createElement('option');
            opt.value = a.id;
            opt.textContent = a.nombre + ' ' + a.apellido;
            selAutor.appendChild(opt);
        });

        // selects de asignar categoria
        const selLibro = document.getElementById('libroSelCat');
        const selCat   = document.getElementById('catSelCat');
        selCat.innerHTML = '<option value="">Seleccionar categoria...</option>';
        categorias.forEach(function(c) {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.nombre;
            selCat.appendChild(opt);
        });

        return { autores, categorias };
    }

    async function cargarLibros() {
        const res    = await fetch(API_LIBROS);
        const libros = await res.json();
        const tbody  = document.getElementById('tablaBody');

        // actualizar select de libros en la seccion de categorias
        const selLibro = document.getElementById('libroSelCat');
        selLibro.innerHTML = '<option value="">Seleccionar libro...</option>';
        libros.forEach(function(l) {
            const opt = document.createElement('option');
            opt.value = l.id;
            opt.textContent = l.titulo;
            selLibro.appendChild(opt);
        });

        tbody.innerHTML = '';
        libros.forEach(function(l) {
            const cats = (l.categorias && l.categorias.length > 0)
                ? l.categorias.map(function(c) { return '<span class="badge bg-secondary me-1">' + c.nombre + '</span>'; }).join('')
                : '-';
            const tr = document.createElement('tr');
            tr.innerHTML =
                '<td>' + l.id + '</td>' +
                '<td>' + l.titulo + '</td>' +
                '<td>' + l.isbn + '</td>' +
                '<td>' + l.anioPublicacion + '</td>' +
                '<td>' + (l.editorial || '-') + '</td>' +
                '<td>' + l.autor.nombre + ' ' + l.autor.apellido + '</td>' +
                '<td>' + cats + '</td>' +
                '<td>' +
                    '<button class="btn btn-sm btn-warning me-1" onclick="editarLibro(' + l.id + ',\'' + escapeJs(l.titulo) + '\',\'' + escapeJs(l.isbn) + '\',' + l.anioPublicacion + ',\'' + escapeJs(l.editorial || '') + '\',' + l.autor.id + ')">Editar</button>' +
                    '<button class="btn btn-sm btn-danger" onclick="eliminarLibro(' + l.id + ')">Eliminar</button>' +
                '</td>';
            tbody.appendChild(tr);
        });
    }

    document.getElementById('formLibro').addEventListener('submit', async function(e) {
        e.preventDefault();
        var id = document.getElementById('libroId').value;
        var body = {
            titulo: document.getElementById('titulo').value,
            isbn: document.getElementById('isbn').value,
            anioPublicacion: document.getElementById('anioPublicacion').value,
            editorial: document.getElementById('editorial').value,
            autorId: document.getElementById('libroAutorId').value
        };
        var url    = id ? API_LIBROS + '/' + id : API_LIBROS;
        var method = id ? 'PUT' : 'POST';
        var res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            limpiarForm();
            cargarLibros();
        } else {
            var err = await res.json();
            alert(JSON.stringify(err));
        }
    });

    function editarLibro(id, titulo, isbn, anio, editorial, autorId) {
        document.getElementById('libroId').value = id;
        document.getElementById('titulo').value = titulo;
        document.getElementById('isbn').value = isbn;
        document.getElementById('anioPublicacion').value = anio;
        document.getElementById('editorial').value = editorial;
        document.getElementById('libroAutorId').value = autorId;
        document.getElementById('formTitulo').textContent = 'Editar Libro';
    }

    async function eliminarLibro(id) {
        if (!confirm('Desea eliminar este libro?')) return;
        var res = await fetch(API_LIBROS + '/' + id, { method: 'DELETE' });
        if (res.ok) {
            cargarLibros();
        } else {
            alert('No se pudo eliminar');
        }
    }

    document.getElementById('btnAsignar').addEventListener('click', async function() {
        var libroId = document.getElementById('libroSelCat').value;
        var catId   = document.getElementById('catSelCat').value;
        if (!libroId || !catId) { alert('Selecciona un libro y una categoria'); return; }
        var res = await fetch(API_LIBROS + '/' + libroId + '/categorias/' + catId, { method: 'POST' });
        if (res.ok) { cargarLibros(); } else { alert('Error al asignar categoria'); }
    });

    document.getElementById('btnQuitar').addEventListener('click', async function() {
        var libroId = document.getElementById('libroSelCat').value;
        var catId   = document.getElementById('catSelCat').value;
        if (!libroId || !catId) { alert('Selecciona un libro y una categoria'); return; }
        var res = await fetch(API_LIBROS + '/' + libroId + '/categorias/' + catId, { method: 'DELETE' });
        if (res.ok) { cargarLibros(); } else { alert('Error al quitar categoria'); }
    });

    function limpiarForm() {
        document.getElementById('formLibro').reset();
        document.getElementById('libroId').value = '';
        document.getElementById('formTitulo').textContent = 'Nuevo Libro';
    }

    function escapeJs(str) {
        if (!str) return '';
        return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    cargarSelectores();
    cargarLibros();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
