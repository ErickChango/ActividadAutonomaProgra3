<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Libreria - Libros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">📚 Libreria</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/autores">Autores</a>
            <a class="nav-link" href="/perfiles">Perfiles</a>
            <a class="nav-link active" href="/libros">Libros</a>
            <a class="nav-link" href="/categorias">Categorias</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Libros</h2>
    <p class="text-muted">Relacion uno a muchos con Autor — Relacion muchos a muchos con Categoria</p>

    <!-- formulario para crear o editar libro -->
    <div class="card mb-3">
        <div class="card-header" id="formTitulo">Nuevo Libro</div>
        <div class="card-body">
            <form id="formLibro">
                <input type="hidden" id="libroId"/>
                <div class="row g-2">
                    <div class="col-md-3">
                        <input class="form-control" id="titulo" placeholder="Titulo" required/>
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" id="isbn" placeholder="ISBN" required/>
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" id="anioPublicacion" type="number"
                               placeholder="Anio" min="1000" max="2100" required/>
                    </div>
                    <div class="col-md-2">
                        <input class="form-control" id="editorial" placeholder="Editorial"/>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="libroAutorId" required>
                            <option value="">Seleccionar autor...</option>
                            <option th:each="a : ${autores}"
                                    th:value="${a.id}"
                                    th:text="${a.nombre + ' ' + a.apellido}"></option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary mt-2" type="submit">Guardar</button>
                <button class="btn btn-secondary mt-2" type="button" onclick="limpiarForm()">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- asignar o quitar categoria a un libro -->
    <div class="card mb-4">
        <div class="card-header">Asignar o quitar categoria</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-4">
                    <select class="form-select" id="libroSelCat">
                        <option value="">Seleccionar libro...</option>
                        <option th:each="l : ${libros}" th:value="${l.id}" th:text="${l.titulo}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select" id="catSelCat">
                        <option value="">Seleccionar categoria...</option>
                        <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success" id="btnAsignar">Asignar</button>
                    <button class="btn btn-outline-danger ms-2" id="btnQuitar">Quitar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- tabla de libros -->
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Titulo</th>
            <th>ISBN</th>
            <th>Anio</th>
            <th>Editorial</th>
            <th>Autor</th>
            <th>Categorias</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="l : ${libros}">
            <td th:text="${l.id}"></td>
            <td th:text="${l.titulo}"></td>
            <td th:text="${l.isbn}"></td>
            <td th:text="${l.anioPublicacion}"></td>
            <td th:text="${l.editorial}"></td>
            <td th:text="${l.autor.nombre + ' ' + l.autor.apellido}"></td>
            <td>
                <span th:each="c : ${l.categorias}">
                    <span class="badge bg-secondary" th:text="${c.nombre}"></span>
                </span>
            </td>
            <td>
                <button class="btn btn-sm btn-warning btn-editar"
                        th:data-id="${l.id}"
                        th:data-titulo="${l.titulo}"
                        th:data-isbn="${l.isbn}"
                        th:data-anio="${l.anioPublicacion}"
                        th:data-editorial="${l.editorial}"
                        th:data-autor-id="${l.autor.id}">
                    Editar
                </button>
                <button class="btn btn-sm btn-danger btn-eliminar"
                        th:data-id="${l.id}">
                    Eliminar
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    // guardar o actualizar libro
    document.getElementById('formLibro').addEventListener('submit', async function(e) {
        e.preventDefault();
        var id = document.getElementById('libroId').value;
        var body = {
            titulo: document.getElementById('titulo').value,
            isbn: document.getElementById('isbn').value,
            anioPublicacion: document.getElementById('anioPublicacion').value,
            editorial: document.getElementById('editorial').value,
            autorId: document.getElementById('libroAutorId').value
        };
        var url = id ? '/api/libros/' + id : '/api/libros';
        var method = id ? 'PUT' : 'POST';
        var res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) {
            location.reload();
        } else {
            var err = await res.json();
            alert(JSON.stringify(err));
        }
    });

    // cargar datos en el formulario para editar
    document.querySelectorAll('.btn-editar').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.getElementById('libroId').value = btn.dataset.id;
            document.getElementById('titulo').value = btn.dataset.titulo;
            document.getElementById('isbn').value = btn.dataset.isbn;
            document.getElementById('anioPublicacion').value = btn.dataset.anio;
            document.getElementById('editorial').value = btn.dataset.editorial;
            document.getElementById('libroAutorId').value = btn.dataset.autorId;
            document.getElementById('formTitulo').textContent = 'Editar Libro';
        });
    });

    // eliminar libro
    document.querySelectorAll('.btn-eliminar').forEach(function(btn) {
        btn.addEventListener('click', async function() {
            if (!confirm('Desea eliminar este libro?')) return;
            var res = await fetch('/api/libros/' + btn.dataset.id, { method: 'DELETE' });
            if (res.ok) {
                location.reload();
            } else {
                alert('No se pudo eliminar');
            }
        });
    });

    // asignar categoria al libro
    document.getElementById('btnAsignar').addEventListener('click', async function() {
        var libroId = document.getElementById('libroSelCat').value;
        var catId = document.getElementById('catSelCat').value;
        if (!libroId || !catId) {
            alert('Selecciona un libro y una categoria');
            return;
        }
        var res = await fetch('/api/libros/' + libroId + '/categorias/' + catId, { method: 'POST' });
        if (res.ok) {
            location.reload();
        } else {
            alert('Error al asignar categoria');
        }
    });

    // quitar categoria del libro
    document.getElementById('btnQuitar').addEventListener('click', async function() {
        var libroId = document.getElementById('libroSelCat').value;
        var catId = document.getElementById('catSelCat').value;
        if (!libroId || !catId) {
            alert('Selecciona un libro y una categoria');
            return;
        }
        var res = await fetch('/api/libros/' + libroId + '/categorias/' + catId, { method: 'DELETE' });
        if (res.ok) {
            location.reload();
        } else {
            alert('Error al quitar categoria');
        }
    });

    // limpiar formulario
    function limpiarForm() {
        document.getElementById('formLibro').reset();
        document.getElementById('libroId').value = '';
        document.getElementById('formTitulo').textContent = 'Nuevo Libro';
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
